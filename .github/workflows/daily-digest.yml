name: Daily OVERHEAR digest

on:
  schedule:
    # Weekdays Mon–Fri. GitHub schedule is UTC; UTC matches GMT, so this is 10:00 GMT year-round.
    # (When the UK is on BST, local civil time is one hour ahead of GMT — i.e. 10:00 GMT = 11:00 in London.)
    - cron: "0 10 * * 1-5"
  # Test the same job as cron: Actions → Daily OVERHEAR digest → Run workflow (optionally enable dry run).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch and score only; print digest to logs (no email)"
        required: false
        default: false
        type: boolean

concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      # v6 / v5 / v6 use Node.js 24 (avoids Node 20 deprecation on hosted runners)
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: data/digest_history.json
          key: digest-history-${{ github.run_id }}
          restore-keys: digest-history-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run digest
        env:
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: |
          set -e
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            overhear-digest --dry-run --print-email
          else
            overhear-digest
          fi
